name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Real Postgres for the DB + HTTP integration tests. The tests apply the
    # embedded migrations themselves; they skip unless TEST_DATABASE_DSN is set.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: bank0_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d bank0_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_DSN: postgres://admin:admin@localhost:5432/bank0_test?sslmode=disable

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (unit + DB/HTTP integration, race detector)
        run: go test -race ./...
