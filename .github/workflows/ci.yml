name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      pg_version:
        description: Postgres major version for the integration tests (Supabase parity = 17)
        type: choice
        default: "18"
        options: ["18", "17"]

# Pinned generator versions — keep in lockstep with CLAUDE.md. If these drift,
# the generate-drift gate below will fail with a churned generated file.
env:
  SQLC_VERSION: v1.31.1
  OAPI_CODEGEN_VERSION: v2.7.1
  TEMPL_VERSION: v0.3.1020
  GOOSE_VERSION: v3.27.1

jobs:
  test:
    runs-on: ubuntu-latest

    # Real Postgres for the DB + HTTP integration tests. The tests apply the
    # embedded migrations themselves; they skip unless TEST_DATABASE_DSN is set.
    # Postgres 18 by default. Manually dispatch with pg_version=17 to test against
    # the Supabase deploy target (docs/08); the uuidv7() polyfill in migration 00001
    # makes the schema run on <18, so both versions exercise real production paths.
    services:
      postgres:
        image: postgres:${{ github.event.inputs.pg_version || '18' }}
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: bank0_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d bank0_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_DSN: postgres://admin:admin@localhost:5432/bank0_test?sslmode=disable

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (unit + DB/HTTP integration, race detector)
        run: go test -race ./...

  # Contract-first gate: regenerating from the sources must produce no diff, i.e.
  # the committed sqlc / oapi-codegen / templ output is in sync with the spec,
  # queries, migrations, and templates. Drift here is a build error by policy
  # (CLAUDE.md rule 3).
  generate-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pinned generators
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@${SQLC_VERSION}
          go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@${OAPI_CODEGEN_VERSION}
          go install github.com/a-h/templ/cmd/templ@${TEMPL_VERSION}

      - name: Regenerate
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          sqlc generate -f db/sqlc.yaml
          oapi-codegen -config api/oapi-codegen.client.yaml api/openapi.yaml
          oapi-codegen -config api/oapi-codegen.admin.yaml api/openapi.yaml
          templ generate

      - name: Fail on drift
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated code is out of date. Run 'task generate' and commit the result." >&2
            exit 1
          fi

  # Worker /api proxy-contract test (docs/specs/spec-e2e-harness.md, Tier B "cheaper
  # intermediate"). Cheap and DB-free — runs the real worker in workerd via
  # @cloudflare/vitest-pool-workers, so it runs per-PR.
  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          # node 24; wrangler >= 4.105 (via vitest-pool-workers 0.18) needs >= 22
          node-version: "24"
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install
        run: npm ci
        working-directory: worker
      - name: Proxy-contract test
        run: npm test
        working-directory: worker

  # Customer-PWA unit tests (pure logic: IBAN validation, etc.). Cheap and DB-free,
  # so it gates every PR. The IBAN length table's cross-source drift is guarded
  # separately by a Go test (internal/iban/drift_test.go).
  webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/app/package-lock.json
      - name: Install
        run: npm ci
        working-directory: web/app
      - name: Unit tests
        run: npm test
        working-directory: web/app

  # Tier A end-to-end: the REAL two-binary split topology (portal + api processes)
  # behind `//go:build e2e`. Go + Postgres only (no browser), so it gates every PR as
  # the regression net for split-mode routing. PG17 parity is still a manual dispatch
  # (pg_version input); the heavy browser tier (e2e-browser) also stays manual.
  e2e-go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:${{ github.event.inputs.pg_version || '18' }}
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: bank0_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d bank0_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_DSN: postgres://admin:admin@localhost:5432/bank0_e2e?sslmode=disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Tier A split-mode e2e
        run: go test -tags e2e -count=1 ./internal/e2e/ -v

  # Tier B browser e2e: the customer PWA driven through Playwright against the real
  # api binary + a seeded Postgres (the suite's globalSetup self-manages a throwaway
  # PG via docker). Heaviest job; manual only.
  e2e-browser:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/app/package-lock.json
      - name: Install deps
        run: npm ci
        working-directory: web/app
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: web/app
      - name: Run Playwright e2e
        run: npx playwright test
        working-directory: web/app
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: web/app/playwright-report
          retention-days: 7

  # Every migration must be reversible (CLAUDE.md): up -> reset(down all) -> up on
  # a throwaway PG17, the same version Supabase runs.
  migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: bank0_mig
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d bank0_mig"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DSN: postgres://admin:admin@localhost:5432/bank0_mig?sslmode=disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@${GOOSE_VERSION}
      - name: up -> reset -> up
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          goose -dir db/migrations postgres "$DSN" up
          goose -dir db/migrations postgres "$DSN" reset
          goose -dir db/migrations postgres "$DSN" up
