# Pin the Compose project name so this stack never collides with another repo whose
# deploy/ dir would otherwise default to the same project ("deploy"). Keeps bank0's
# containers/volumes/network namespaced under "bank0".
name: bank0

services:
  db:
    image: postgres:${PG_VERSION:-18}   # default 18; PG_VERSION=17 for Supabase parity
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bank0
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bank0"]
      interval: 3s
      timeout: 3s
      retries: 10

  # One-shot: apply embedded migrations, then exit.
  migrate:
    image: bank0:dev
    command: ["migrate", "up"]
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_DATABASE_DSN: postgres://admin:admin@db:5432/bank0?sslmode=disable

  # Admin portal + operator console -> http://localhost:8080
  # Gated on migrate (NOT seed): the app must start against a migrated DB regardless
  # of demo data, mirroring prod where there is no seed. The dev seed is loaded
  # separately once the stack is up — `task seed` (or `task dev:reset` for a fresh one).
  admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: bank0:dev
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_DATABASE_DSN: postgres://admin:admin@db:5432/bank0?sslmode=disable
      APP_SERVER_MODE: portal
      APP_SERVER_AUTO_MIGRATE: "false"
      APP_ADMIN_RUN_MAINTENANCE: "true"
      APP_AUTH_JWT_SECRET: dev-shared-secret
      APP_LOGGING_ENCODING: json
    ports:
      - "8080:8080"

  # Client API -> http://localhost:8090
  client:
    image: bank0:dev
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      APP_DATABASE_DSN: postgres://admin:admin@db:5432/bank0?sslmode=disable
      APP_SERVER_MODE: api
      APP_SERVER_AUTO_MIGRATE: "false"
      APP_ADMIN_RUN_MAINTENANCE: "false"
      APP_AUTH_JWT_SECRET: dev-shared-secret
      APP_LOGGING_ENCODING: json
    ports:
      - "8090:8080"
