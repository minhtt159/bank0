services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: bank0
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bank0"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Single app container serving everything (mode=all), auto-migrating on start.
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_DATABASE_DSN: postgres://admin:admin@db:5432/bank0?sslmode=disable
      APP_SERVER_MODE: all
      APP_SERVER_AUTO_MIGRATE: "true"
      APP_LOGGING_ENCODING: json
    ports:
      - "8080:8080"
