image:
  repository: ghcr.io/minhtt159/bank0
  tag: ""            # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

database:
  # Preferred: reference an existing secret holding the DSN.
  existingSecret: ""        # e.g. "bank0-db"
  secretKey: dsn
  # Dev convenience: if existingSecret is empty and this is set, the chart
  # creates a Secret. Do NOT commit a real DSN here.
  dsn: ""                   # postgres://user:pass@host:5432/bank0?sslmode=require

migrations:
  enabled: true             # run `bank0 migrate up` as a pre-upgrade hook Job

service:
  port: 80

admin:
  makerCheckerThresholdMinor: 1000000   # €10,000.00
  sessionIdleTimeout: 30m

# JWT bearer auth for the client (api) surface. Must be shared across all api
# replicas. Prefer an existing secret; the inline value is for dev only.
auth:
  existingSecret: ""        # secret holding the JWT signing key
  secretKey: jwt-secret
  jwtSecret: ""             # dev only; if set (and no existingSecret) the chart creates a secret
  jwtTTL: 1h

# Gateway API (Envoy Gateway). HTTPRoutes attach to a Gateway by parentRef.
# The chart can create the Gateway, or set create=false to attach to a shared one.
gateway:
  create: true
  name: bank0
  namespace: ""             # parentRef namespace; defaults to the release namespace
  gatewayClassName: eg      # Envoy Gateway GatewayClass (quickstart uses "eg")
  tls:
    enabled: true
    # cert-manager's gateway-shim provisions a per-host cert into each listener's
    # certificateRefs secret when the Gateway is annotated with this issuer.
    clusterIssuer: letsencrypt-prod
  httpsRedirect: true       # add an HTTP->HTTPS redirect HTTPRoute on the :80 listener

# Client-facing API — scaled for HA.
api:
  exposed: true
  host: api.bank0.hnimn.art
  replicaCount: 3
  runMaintenance: false     # maintenance runs on portal only (advisory-locked)
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# Admin portal + operator console.
portal:
  exposed: true
  host: portal.bank0.hnimn.art
  replicaCount: 2
  runMaintenance: true
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits:   { cpu: 500m, memory: 256Mi }
