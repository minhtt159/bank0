apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-portal
  labels:
    app.kubernetes.io/name: bank0
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: portal
spec:
  replicas: {{ .Values.portal.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bank0
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: portal
    spec:
      containers:
        - name: app
          image: {{ include "bank0.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          ports:
            - { name: http, containerPort: 8080 }
          env:
            - { name: APP_SERVER_MODE, value: "portal" }
            - { name: APP_ADMIN_RUN_MAINTENANCE, value: {{ .Values.portal.runMaintenance | quote }} }
            - { name: APP_ADMIN_MAKER_CHECKER_THRESHOLD_MINOR, value: {{ int64 .Values.admin.makerCheckerThresholdMinor | quote }} }
            - { name: APP_ADMIN_SESSION_IDLE_TIMEOUT, value: {{ .Values.admin.sessionIdleTimeout | quote }} }
            - { name: APP_SERVER_AUTO_MIGRATE, value: "false" }
            - { name: APP_LOGGING_ENCODING, value: "json" }
            - { name: APP_APP_ENV, value: "production" }
            {{- include "bank0.dsnEnv" . | nindent 12 }}
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            {{- toYaml .Values.portal.resources | nindent 12 }}
