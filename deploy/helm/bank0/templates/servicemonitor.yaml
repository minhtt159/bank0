{{- if .Values.metrics.serviceMonitor.enabled }}
# Prometheus Operator ServiceMonitor — scrapes /metrics on both the api and portal
# Services (they share the name+instance labels). Requires the Prometheus Operator
# CRDs; gated off by default. Add metrics.serviceMonitor.labels so your Prometheus's
# serviceMonitorSelector matches (e.g. release: kube-prometheus-stack).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: bank0
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bank0
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout }}
{{- end }}
