# https://taskfile.dev
version: '3'

vars:
  APP_NAME: bank0
  BUILD_DIR: bin
  CMD_DIR: cmd/app
  BINARY: "{{.BUILD_DIR}}/{{.APP_NAME}}"

env:
  PATH: "{{.HOME}}/go/bin:$PATH"

tasks:
  default:
    silent: true
    cmds:
      - task --list

  install:
    desc: Install dev CLI tools. Generators are PINNED to the same versions as CI
      (.github/workflows/ci.yml) and CLAUDE.md — @latest here was the source of
      generated-file drift between local and CI. Bump all three in lockstep.
    cmds:
      - go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
      - go install github.com/pressly/goose/v3/cmd/goose@v3.27.1
      - go install github.com/air-verse/air@latest
      - go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@v2.7.1
      - go install github.com/a-h/templ/cmd/templ@v0.3.1020

  deps:
    desc: Download and tidy Go modules
    cmds:
      - go mod download
      - go mod tidy

  generate:
    desc: Run all generators (sqlc -> oapi-codegen -> templ)
    cmds:
      - task: generate:sqlc
      - task: generate:oapi
      - task: generate:templ

  generate:sqlc:
    desc: Regenerate sqlc code from db/queries + db/migrations
    sources:
      - db/queries/**/*.sql
      - db/migrations/**/*.sql
      - db/sqlc.yaml
    generates:
      - internal/db/sqlc/*.go
    cmds:
      - sqlc generate -f db/sqlc.yaml

  generate:oapi:
    desc: Regenerate the client + admin server interfaces from api/openapi.yaml
    sources:
      - api/openapi.yaml
      - api/oapi-codegen.*.yaml
    generates:
      - internal/api/genclient/genclient.gen.go
      - internal/api/genadmin/genadmin.gen.go
    cmds:
      - oapi-codegen -config api/oapi-codegen.client.yaml api/openapi.yaml
      - oapi-codegen -config api/oapi-codegen.admin.yaml api/openapi.yaml

  generate:templ:
    desc: Regenerate Templ components for the operator console
    sources:
      - web/template/**/*.templ
    generates:
      - web/template/**/*_templ.go
    cmds:
      - templ generate

  lint:openapi:
    desc: Lint/audit the OpenAPI spec with Spectral (needs node/npx)
    cmds:
      - npx --yes @stoplight/spectral-cli lint api/openapi.yaml

  webapp:dev:
    desc: Run the customer web app (Vite) — proxies /api to VITE_API_PROXY (default :8090)
    dir: web/app
    cmds:
      - npm install
      - npm run dev

  webapp:build:
    desc: Build the customer SPA to web/app/dist (typecheck + Vite + PWA)
    dir: web/app
    cmds:
      - npm install
      - npm run build

  webapp:deploy:
    desc: Build the SPA then deploy the Cloudflare Worker (needs CF auth)
    deps: [webapp:build]
    dir: worker
    cmds:
      - npm install
      - npm run deploy

  build:
    desc: Generate then build the binary
    deps: [generate]
    cmds:
      - go build -o {{.BINARY}} ./{{.CMD_DIR}}
      - echo "Binary -> {{.BINARY}}"

  quick:
    desc: Build without regenerating
    cmds:
      - go build -o {{.BINARY}} ./{{.CMD_DIR}}

  run:
    desc: Run the app (needs Postgres + migrations applied)
    cmds:
      - go run ./{{.CMD_DIR}}

  test:
    desc: Run unit tests with the race detector (DB integration tests skip)
    cmds:
      - go test -race ./...

  test:db:
    desc: >-
      Run DB integration tests against a throwaway bank0_test database. Postgres 18
      by default; pass PG=17 for Supabase parity (task test:db PG=17). The db service
      has no volume, so switching versions just recreates a fresh container.
    env:
      PG_VERSION: '{{.PG | default "18"}}'
    cmds:
      # --wait blocks on the healthcheck so a freshly (re)created container — e.g. when
      # switching PG version — is ready before the psql calls below.
      - docker compose -f deploy/docker-compose.dev.yml up -d --wait db
      - docker compose -f deploy/docker-compose.dev.yml exec -T db psql -U admin -d bank0 -c "DROP DATABASE IF EXISTS bank0_test;"
      - docker compose -f deploy/docker-compose.dev.yml exec -T db psql -U admin -d bank0 -c "CREATE DATABASE bank0_test;"
      - TEST_DATABASE_DSN='postgres://admin:admin@localhost:5432/bank0_test?sslmode=disable' go test -race ./internal/db/ -v

  vet:
    cmds:
      - go vet ./...

  dev:docker:
    desc: Start Postgres (18 by default; PG=17 for Supabase parity) + app with hot-reload
    env:
      PG_VERSION: '{{.PG | default "18"}}'
    cmds:
      - docker compose -f deploy/docker-compose.dev.yml up --build

  dev:docker:down:
    cmds:
      - docker compose -f deploy/docker-compose.dev.yml down

  migrate:up:
    desc: Apply all pending migrations (reads GOOSE_* from .env)
    cmds:
      - goose -dir db/migrations up

  migrate:down:
    cmds:
      - goose -dir db/migrations down

  migrate:status:
    cmds:
      - goose -dir db/migrations status

  migrate:create:
    desc: "Create a migration  (usage: task migrate:create -- <name>)"
    cmds:
      - goose -dir db/migrations create {{.CLI_ARGS}} sql

  seed:demo:
    desc: Load the large IBAN-backed demo seed (db/seed_demo.sql) into the dev `bank0` db (run after migrations)
    cmds:
      - docker compose -f deploy/docker-compose.dev.yml up -d --wait db
      - docker compose -f deploy/docker-compose.dev.yml exec -T db psql -U admin -d bank0 -v ON_ERROR_STOP=1 < db/seed_demo.sql

  seed:demo:gen:
    desc: "Regenerate db/seed_demo.sql from an IBAN assets dir (override ASSETS=/path/to/ibans)"
    vars:
      ASSETS: '{{.ASSETS | default "db/seedgen/ibans"}}'
    cmds:
      - go run ./db/seedgen -assets {{.ASSETS}} -out db/seed_demo.sql

  smoke:
    desc: Run the SQL smoke test against the dev database
    cmds:
      - psql "$GOOSE_DBSTRING" -f db/smoke_test.sql

  clean:
    cmds:
      - rm -rf {{.BUILD_DIR}} tmp
      - find internal/db/sqlc -name "*.go" -delete
      - go clean
