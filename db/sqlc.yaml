version: "2"
sql:
  - engine: "postgresql"
    schema: "./migrations/"
    queries: "./queries"
    gen:
      go:
        package: "sqlc"
        out: "../internal/db/sqlc/"
        emit_json_tags: true
        json_tags_case_style: "snake"
        sql_package: "pgx/v5"
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              package: uuid
              type: UUID
          - db_type: uuid
            nullable: true
            go_type:
              import: github.com/google/uuid
              package: uuid
              type: UUID
              pointer: true
          - db_type: "timestamptz"
            go_type:
              type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
          - db_type: "text"
            go_type:
              type: "string"
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "citext"
            go_type:
              type: "string"
          - db_type: "citext"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "pg_catalog.varchar"
            go_type:
              type: "string"
          - db_type: "pg_catalog.varchar"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "pg_catalog.bool"
            go_type:
              type: "bool"
          - db_type: "pg_catalog.int8"
            go_type:
              type: "int64"
          - db_type: "pg_catalog.int8"
            nullable: true
            go_type:
              type: "int64"
              pointer: true
          - db_type: "pg_catalog.int4"
            go_type:
              type: "int32"
